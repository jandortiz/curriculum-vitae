name: Build CVs

on:
  push:
    branches: [main]
    paths:
      - '**.tex'
      - 'awesome-cv.cls'
      - 'fonts/**'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Set up Git repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compile cv-analyst-es
        uses: xu-cheng/latex-action@v3
        with:
          root_file: cv-analyst-es.tex
          latexmk_use_lualatex: true

      - name: Compile cv-analyst-en
        uses: xu-cheng/latex-action@v3
        with:
          root_file: cv-analyst-en.tex
          latexmk_use_lualatex: true

      - name: Compile cv-engineer-es
        uses: xu-cheng/latex-action@v3
        with:
          root_file: cv-engineer-es.tex
          latexmk_use_lualatex: true

      - name: Compile cv-engineer-en
        uses: xu-cheng/latex-action@v3
        with:
          root_file: cv-engineer-en.tex
          latexmk_use_lualatex: true

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT

      - name: Push PDFs to branch
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          if git show-ref --verify --quiet refs/remotes/origin/curriculum-vitae-pdfs; then
            git checkout curriculum-vitae-pdfs
          else
            git checkout --orphan curriculum-vitae-pdfs
            git rm -rf .
          fi

          for FILE in cv-analyst-es cv-analyst-en cv-engineer-es cv-engineer-en; do
            if [ -f "${FILE}.pdf" ]; then
              cp "${FILE}.pdf" "jefferson-garcia-${FILE#cv-}.pdf"
            fi
          done

          git add jefferson-garcia-*.pdf
          git commit -m "feat: Actualiza CVs - ${{ steps.date.outputs.date }}" || echo "No changes to commit"
          git push origin curriculum-vitae-pdfs

      - name: Upload PDFs as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: curriculum-vitae-pdfs
          path: jefferson-garcia-*.pdf
